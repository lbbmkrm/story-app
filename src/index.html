<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Story App - Platform berbagi momen dan cerita berbasis lokasi geografis"
    />
    <link rel="shortcut icon" href="/favicon.png" />
    <title>Story App</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script type="module" src="/scripts/index.js"></script>
  </head>
  <body>
    <!-- Skip to Content (Accessibility) -->
    <a href="#main-content" id="skip-link" class="skip-link"
      >Lewati ke konten</a
    >

    <header>
      <div class="main-header container">
        <a class="brand-name" href="#/" aria-label="Story App Beranda">
          <img src="/images/logo.png" alt="Story App Logo" class="logo" />
          <span>Story App</span>
        </a>

        <nav
          id="navigation-drawer"
          class="navigation-drawer"
          aria-label="Navigasi Utama"
        >
          <ul id="nav-list" class="nav-list">
            <li><a href="#/">Beranda</a></li>
            <li><a href="#/about">Tentang</a></li>
          </ul>

          <!-- Navigasi Aksi Khusus Mobile -->
          <div class="nav-actions-mobile">
            <div id="guestActionsMobile">
              <a href="#/login" class="btn btn-outline">Login</a>
              <a href="#/register" class="btn btn-primary">Daftar</a>
            </div>
            <div id="logoutBtnMobile" style="display: none">
              <a href="#logout" class="btn btn-primary logout-link">Logout</a>
            </div>
          </div>
        </nav>

        <div class="nav-actions">
          <div id="guestActions">
            <a href="#/login" class="btn btn-outline">Login</a>
            <a href="#/register" class="btn btn-primary">Daftar</a>
          </div>
          <div id="logoutBtn" style="display: none">
            <a href="#logout" class="btn btn-primary logout-link">Logout</a>
          </div>
        </div>

        <button
          id="drawer-button"
          class="drawer-button"
          aria-label="Buka menu navigasi"
          aria-expanded="false"
          aria-controls="navigation-drawer"
        >
          ☰
        </button>
      </div>
    </header>

    <main
      id="main-content"
      class="main-content"
      role="main"
      tabindex="-1"
    ></main>

    <footer
      class="main-footer"
      style="
        padding: 20px;
        text-align: center;
        background: var(--bg-secondary);
        border-top: 1px solid var(--border-light);
        margin-top: auto;
      "
    >
      <div class="container">
        <p>&copy; 2026 Story App. Dibuat dengan ... untuk berbagi cerita.</p>
      </div>
    </footer>
  </body>
</html>
